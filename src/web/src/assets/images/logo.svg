<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="50" viewBox="0 0 200 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Requirements addressed:
       - Frontend Design Consistency (Technical Specifications/3.1 User Interface Design/Design System Specifications)
         Uses theme colors and consistent branding elements
       - Accessibility Compliance (Technical Specifications/3.1 User Interface Design/Accessibility)
         Includes ARIA labels and title for screen readers -->
  
  <!-- Accessibility elements -->
  <title>Estate Kit Logo</title>
  <desc>The official logo of Estate Kit, featuring a stylized house icon and company name</desc>

  <!-- House icon -->
  <g aria-label="House icon">
    <!-- Roof -->
    <path 
      d="M25 10L45 25H5L25 10Z" 
      fill="#2C5282" 
      stroke="#2C5282" 
      stroke-width="2"
    />
    <!-- House body -->
    <rect 
      x="10" 
      y="25" 
      width="30" 
      height="20" 
      fill="#2C5282"
    />
    <!-- Door -->
    <rect 
      x="20" 
      y="32" 
      width="10" 
      height="13" 
      fill="#FFFFFF"
    />
  </g>

  <!-- Company name text -->
  <g aria-label="Estate Kit text">
    <text 
      x="60" 
      y="35" 
      font-family="Inter, sans-serif" 
      font-size="24" 
      font-weight="700" 
      fill="#2C5282"
    >
      Estate Kit
    </text>
  </g>

  <!-- Optional: Add hover effect -->
  <style>
    @media (hover: hover) {
      g:hover {
        opacity: 0.9;
        transition: opacity 0.2s ease-in-out;
      }
    }
    /* High contrast mode support */
    @media (prefers-contrast: high) {
      path, rect {
        fill: #000000;
        stroke: #000000;
      }
      text {
        fill: #000000;
      }
    }
    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
      }
    }
  </style>
</svg>