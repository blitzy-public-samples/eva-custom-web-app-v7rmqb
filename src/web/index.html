<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2C5282" />
    
    <!-- App title -->
    <title>Estate Kit</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Preload critical fonts -->
    <link 
      rel="preload" 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <link 
      rel="preload" 
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap"
      as="style" 
      onload="this.onload=null;this.rel='stylesheet'"
    />

    <!-- Font fallback to prevent FOIT -->
    <style>
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: local('Inter Regular'), local('Inter-Regular'),
             url(https://fonts.gstatic.com/s/inter/v12/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hiA.woff2) format('woff2');
      }
    </style>

    <!-- Critical CSS -->
    <style>
      :root {
        --primary-color: #2C5282;
        --background-color: #f9f9f9;
      }
      
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: var(--background-color);
      }

      #root {
        min-height: 100vh;
      }

      /* Loading state styles */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        color: var(--primary-color);
      }
    </style>

    <!-- Preconnect to critical domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <noscript>
      <div style="padding: 20px; text-align: center;">
        JavaScript must be enabled to use Estate Kit. Please enable JavaScript in your browser settings.
      </div>
    </noscript>

    <!-- React root element -->
    <div id="root">
      <div class="app-loading">
        Loading Estate Kit...
      </div>
    </div>

    <!-- PWA support -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .catch(error => {
              console.error('Service worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
